<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Chocolate Recipe</title>
    <link rel="stylesheet" href="recipe-styles.css">
    <script src="hot-chocolate.js" defer></script>
</head>
<body>
    <h1>Hot Chocolate</h1>
    <div>
        <label for="servings">Number of servings:</label>
        <input type="number" id="servings" name="servings" value="2" min="1" onchange="updateServings()">
    </div>
    <div class="ingredients">
        <h2>Ingredients</h2>
        <ul>
            <li id="milk">1 cup whole milk</li>
            <li id="cocoa-powder">1 tbsp cocoa powder</li>
            <li id="chocolate-chips">1 tbsp chocolate chips</li>
            <li id="sugar">0.5 tbsp sugar</li>
            <li id="vanilla-extract">1/8 tsp vanilla extract</li>
        </ul>
    </div>
    <div class="instructions">
        <h2>Instructions</h2>
        <ol>
            <li>Set milk on medium heat.</li>
            <li>Once the milk is warm, add other ingredients and mix.</li>
        </ol>
    </div>
</body>
</html>
